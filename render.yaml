services:
  - type: worker
    name: daniel-telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    disk:
      name: db
      mountPath: /data
    envVars:
      - key: DB_PATH
        value: /data/messages.db
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_IDS
        sync: false
      - key: TELEGRAM_CHAT_NAMES
        sync: false
      - key: META_PAGE_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_ACCOUNT_ID
        sync: false
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
